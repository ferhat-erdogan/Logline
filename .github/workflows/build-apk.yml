name: build-apk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout sources
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: build debug apk
        run: ./gradlew assembleDebug --stacktrace

      - name: build release apk
        run: ./gradlew assembleRelease --stacktrace

      # Benzersiz sürüm ismi oluşturmak için tarih ve commit bilgisini alıyoruz
      - name: Generate Release Tag
        id: release_tag
        run: |
          echo "tag=v$(date +'%Y.%m.%d-%H%M')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # Her başarılı push'ta tamamen yeni ve kalıcı bir Release oluşturur
      - name: Create Release and Upload APKs
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "Build ${{ steps.release_tag.outputs.tag }}"
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
